<!doctype html>

<html lang="en">
<head>
  <meta charset="utf-8">
  <title>404 – Not Found | WalterCK</title>
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <meta name="robots" content="noindex">
  <link rel="icon" href="/images/walterck.png">
  <link href="https://fonts.googleapis.com/css2?family=Oxanium:wght@400;600;700;800&display=swap" rel="stylesheet">

  <style>
    :root {
      --bg:        #05070a;
      --accent:    #6b8cff;
      --glow:      rgba(107, 140, 255, 0.28);
      --text:      #e6eef6;
      --muted:     #94a3b8;
      --glass:     rgba(255, 255, 255, 0.04);
      --border:    rgba(255, 255, 255, 0.08);
      --radius:    16px;
    }

    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    html, body {
      min-height: 100vh;
      background: var(--bg);
      color: var(--text);
      font-family: 'Oxanium', sans-serif;
      -webkit-font-smoothing: antialiased;
      overflow-x: hidden;
    }

    /* ── Ambient background ── */
    body::before {
      content: '';
      position: fixed;
      inset: 0;
      z-index: 0;
      pointer-events: none;
      background:
        radial-gradient(circle at 20% 30%, rgba(107,140,255,0.12) 0%, transparent 50%),
        radial-gradient(circle at 80% 70%, rgba(107,140,255,0.08) 0%, transparent 45%);
    }

    /* ── Grid overlay texture ── */
    body::after {
      content: '';
      position: fixed;
      inset: 0;
      z-index: 0;
      pointer-events: none;
      background-image:
        linear-gradient(rgba(107,140,255,0.04) 1px, transparent 1px),
        linear-gradient(90deg, rgba(107,140,255,0.04) 1px, transparent 1px);
      background-size: 60px 60px;
      mask-image: radial-gradient(circle at 50% 50%, black 30%, transparent 80%);
      -webkit-mask-image: radial-gradient(circle at 50% 50%, black 30%, transparent 80%);
    }

    /* ── Page layout ── */
    .page {
      position: relative;
      z-index: 1;
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      padding: 40px 24px;
      text-align: center;
    }

    /* ── Big 404 glitch number ── */
    .four-oh-four {
      position: relative;
      font-size: clamp(7rem, 22vw, 14rem);
      font-weight: 800;
      letter-spacing: -0.06em;
      line-height: 1;
      user-select: none;
      margin-bottom: 8px;
    }

    .four-oh-four span {
      position: relative;
      display: inline-block;
      color: transparent;
      -webkit-text-stroke: 1.5px rgba(107,140,255,0.6);
    }

    /* Glitch pseudo layers */
    .four-oh-four span::before,
    .four-oh-four span::after {
      content: attr(data-text);
      position: absolute;
      inset: 0;
      -webkit-text-stroke: 0;
    }
    .four-oh-four span::before {
      color: var(--accent);
      animation: glitch-a 3.2s infinite steps(1);
      clip-path: polygon(0 0, 100% 0, 100% 40%, 0 40%);
    }
    .four-oh-four span::after {
      color: #5be6c0;
      animation: glitch-b 3.2s infinite steps(1);
      clip-path: polygon(0 60%, 100% 60%, 100% 100%, 0 100%);
    }

    @keyframes glitch-a {
      0%,90%,100% { transform: none; opacity: 0; }
      92%          { transform: translate(-4px, 2px) skewX(-4deg); opacity: 0.8; }
      94%          { transform: translate(4px, -2px) skewX(3deg); opacity: 0.6; }
      96%          { transform: translate(-2px, 0); opacity: 0.9; }
      98%          { transform: none; opacity: 0; }
    }
    @keyframes glitch-b {
      0%,90%,100% { transform: none; opacity: 0; }
      91%          { transform: translate(5px, -3px) skewX(5deg); opacity: 0.7; }
      93%          { transform: translate(-3px, 2px); opacity: 0.5; }
      95%          { transform: translate(2px, 0) skewX(-2deg); opacity: 0.8; }
      97%          { transform: none; opacity: 0; }
    }

    /* ── Scan line that sweeps across the 404 ── */
    .scanline {
      position: absolute;
      left: -10%;
      width: 120%;
      height: 2px;
      background: linear-gradient(90deg, transparent, var(--accent), transparent);
      opacity: 0;
      animation: scan 4s ease-in-out infinite 0.5s;
      pointer-events: none;
      border-radius: 2px;
      box-shadow: 0 0 12px var(--glow);
    }
    @keyframes scan {
      0%           { top: -5%; opacity: 0; }
      5%           { opacity: 0.8; }
      95%          { opacity: 0.8; }
      100%         { top: 105%; opacity: 0; }
    }

    /* ── Content ── */
    .content {
      animation: fade-up 0.8s cubic-bezier(0.22, 1, 0.36, 1) both 0.15s;
    }
    @keyframes fade-up {
      from { opacity: 0; transform: translateY(28px); }
      to   { opacity: 1; transform: none; }
    }

    .label {
      display: inline-block;
      padding: 5px 14px;
      border: 1px solid rgba(107,140,255,0.3);
      border-radius: 99px;
      font-size: 0.72rem;
      font-weight: 700;
      letter-spacing: 0.14em;
      text-transform: uppercase;
      color: var(--accent);
      background: rgba(107,140,255,0.08);
      margin-bottom: 22px;
    }

    h1 {
      font-size: clamp(1.4rem, 4vw, 2rem);
      font-weight: 800;
      letter-spacing: -0.03em;
      margin-bottom: 14px;
      color: var(--text);
    }

    .sub {
      color: var(--muted);
      font-size: 1rem;
      line-height: 1.65;
      max-width: 380px;
      margin: 0 auto 36px;
    }

    /* ── Buttons ── */
    .actions {
      display: flex;
      gap: 12px;
      justify-content: center;
      flex-wrap: wrap;
    }

    .btn-primary {
      display: inline-flex;
      align-items: center;
      gap: 8px;
      padding: 13px 28px;
      background: var(--accent);
      color: #fff;
      border-radius: 14px;
      font-size: 0.92rem;
      font-weight: 700;
      text-decoration: none;
      letter-spacing: -0.01em;
      transition: all 0.22s;
      box-shadow: 0 4px 24px var(--glow);
    }
    .btn-primary:hover {
      transform: translateY(-3px);
      box-shadow: 0 8px 36px var(--glow);
      opacity: 0.88;
    }

    .btn-secondary {
      display: inline-flex;
      align-items: center;
      gap: 8px;
      padding: 13px 24px;
      background: var(--glass);
      border: 1px solid var(--border);
      color: var(--text);
      border-radius: 14px;
      font-size: 0.92rem;
      font-weight: 600;
      text-decoration: none;
      transition: all 0.22s;
      backdrop-filter: blur(12px);
    }
    .btn-secondary:hover {
      border-color: var(--accent);
      background: rgba(107,140,255,0.08);
      transform: translateY(-3px);
    }

    /* ── Floating particles ── */
    .particles {
      position: fixed;
      inset: 0;
      z-index: 0;
      pointer-events: none;
      overflow: hidden;
    }
    .particle {
      position: absolute;
      border-radius: 50%;
      background: var(--accent);
      animation: float linear infinite;
      opacity: 0;
    }

    @keyframes float {
      0%   { transform: translateY(110vh) scale(0); opacity: 0; }
      10%  { opacity: var(--p-opacity); }
      90%  { opacity: var(--p-opacity); }
      100% { transform: translateY(-10vh) scale(1); opacity: 0; }
    }

    /* ── Glitch pill on hover ── */
    .error-code {
      display: inline-block;
      padding: 3px 10px;
      border-radius: 6px;
      background: rgba(255, 60, 60, 0.1);
      border: 1px solid rgba(255, 60, 60, 0.22);
      color: #ff6b6b;
      font-size: 0.78rem;
      font-weight: 700;
      letter-spacing: 0.06em;
      font-family: 'Courier New', monospace;
      margin-bottom: 14px;
    }

    /* ── Bottom divider ── */
    .divider {
      width: 48px;
      height: 2px;
      background: var(--accent);
      border-radius: 2px;
      margin: 40px auto 20px;
      box-shadow: 0 0 10px var(--glow);
      opacity: 0.5;
    }

    .footer-hint {
      color: var(--muted);
      font-size: 0.78rem;
      opacity: 0.6;
    }

    @media (max-width: 480px) {
      .actions { flex-direction: column; align-items: center; }
      .btn-primary, .btn-secondary { width: 100%; max-width: 260px; justify-content: center; }
    }
  </style>

</head>

  <div class="page">
    <div class="four-oh-four" aria-label="404">
      <span data-text="404">404</span>
      <div class="scanline"></div>
    </div>

  <script>
    // Generate floating particles
    const container = document.getElementById('particles');
    const count = 18;
    for (let i = 0; i < count; i++) {
      const p = document.createElement('div');
      p.className = 'particle';
      const size = Math.random() * 3 + 1;
      const opacity = Math.random() * 0.25 + 0.05;
      p.style.cssText = `
        left: ${Math.random() * 100}%;
        width: ${size}px;
        height: ${size}px;
        --p-opacity: ${opacity};
        animation-duration: ${Math.random() * 14 + 10}s;
        animation-delay: ${Math.random() * -20}s;
      `;
      container.appendChild(p);
    }
  </script>

</body>
</html>
