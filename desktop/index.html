<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <title>CK - Desktop</title>
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <link href="https://fonts.googleapis.com/css2?family=Oxanium:wght@300;400;600;700;800&display=swap" rel="stylesheet">
  <link rel="icon" href="../images/favicons/favicon.svg" type="image/svg+xml">
  <link rel="apple-touch-icon" href="../images/favicons/apple-touch-icon.png">
  <link rel="alternate icon" href="../images/favicons/favicon.ico" type="image/x-icon">
  <link rel="manifest" href="../images/favicons/site.webmanifest">
  <style>
    /* ─── Tokens — matches walterck.com ─── */
    :root {
      --bg:        #05070a;
      --bg2:       #0f1419;
      --accent:    #6b8cff;
      --accent2:   #5be6c0;
      --glow:      rgba(107,140,255,0.25);
      --glow2:     rgba(91,230,192,0.18);
      --text:      #e6eef6;
      --muted:     #94a3b8;
      --glass:     rgba(255,255,255,0.03);
      --border:    rgba(255,255,255,0.08);
      --radius:    16px;
      --shadow:    0 12px 40px rgba(0,0,0,0.6);
      --transition: 300ms cubic-bezier(0.4, 0, 0.2, 1);
      --font:      'Oxanium', sans-serif;
    }

    /* ─── Reset ─── */
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    html, body {
      width: 100%; height: 100%; overflow: hidden;
      font-family: var(--font);
      background: var(--bg);
      color: var(--text);
      user-select: none;
      -webkit-font-smoothing: antialiased;
    }

    /* ─── Background layers ─── */
    #bg-canvas { position: fixed; inset: 0; z-index: 0; pointer-events: none; }

    .glow-orb {
      position: fixed; border-radius: 50%; filter: blur(90px);
      pointer-events: none; z-index: 0;
    }
    .glow-orb.a {
      width: 600px; height: 600px;
      top: -150px; left: -100px;
      background: radial-gradient(circle, rgba(107,140,255,0.10) 0%, transparent 70%);
    }
    .glow-orb.b {
      width: 500px; height: 500px;
      bottom: -100px; right: -80px;
      background: radial-gradient(circle, rgba(91,230,192,0.08) 0%, transparent 70%);
    }
    .glow-orb.c {
      width: 300px; height: 300px;
      top: 40%; left: 50%; transform: translate(-50%,-50%);
      background: radial-gradient(circle, rgba(107,140,255,0.05) 0%, transparent 70%);
    }

    /* Grid overlay */
    .grid-overlay {
      position: fixed; inset: 0; z-index: 0; pointer-events: none;
      background-image:
        linear-gradient(rgba(107,140,255,0.025) 1px, transparent 1px),
        linear-gradient(90deg, rgba(107,140,255,0.025) 1px, transparent 1px);
      background-size: 60px 60px;
    }

    /* Rain */
    .rain { position: fixed; inset: 0; z-index: 1; pointer-events: none; overflow: hidden; }
    .drop {
      position: absolute; top: -40px;
      width: 1px; height: 32px;
      background: linear-gradient(to bottom, transparent, rgba(107,140,255,0.3));
      animation: fall linear infinite;
      border-radius: 1px;
    }
    @keyframes fall {
      to { transform: translateY(110vh); }
    }

    /* Scan line */
    .scanline {
      position: fixed; inset: 0; z-index: 2; pointer-events: none;
      background: repeating-linear-gradient(
        0deg, transparent, transparent 2px,
        rgba(0,0,0,0.025) 2px, rgba(0,0,0,0.025) 4px
      );
    }

    /* ─── Layout ─── */
    #app {
      position: relative; z-index: 10;
      width: 100vw; height: 100vh;
      display: grid;
      grid-template-columns: 300px 1fr 280px;
      grid-template-rows: 1fr;
      gap: 20px;
      padding: 28px;
      pointer-events: none;
    }
    #app > * { pointer-events: all; }

    /* ─── Panel base — matches walterck.com .card ─── */
    .panel {
      background: rgba(255,255,255,0.02);
      border: 1px solid var(--border);
      border-radius: var(--radius);
      backdrop-filter: blur(12px);
      -webkit-backdrop-filter: blur(12px);
      padding: 20px;
      position: relative;
      overflow: hidden;
      transition: var(--transition);
    }
    .panel::before {
      content: '';
      position: absolute; inset: 0;
      background: linear-gradient(135deg, rgba(107,140,255,0.03) 0%, transparent 60%);
      pointer-events: none;
      border-radius: var(--radius);
    }
    .panel-title {
      font-size: 0.95rem; font-weight: 700;
      letter-spacing: 0.04em;
      color: var(--text); margin-bottom: 16px;
      display: flex; align-items: center; gap: 7px;
    }

    /* ─── Clock — spans full height, centred ─── */
    #clock-panel {
      grid-column: 2;
      display: flex; flex-direction: column; align-items: center;
      justify-content: flex-start; padding: 14vh 28px 22px;
      background: transparent; border: none;
      backdrop-filter: none;
    }
    #clock-panel::before { display: none; }

    #time-display {
      font-size: clamp(4rem, 7vw, 7rem);
      font-weight: 800; letter-spacing: -0.04em;
      background: linear-gradient(135deg, #ffffff 0%, var(--accent) 65%);
      -webkit-background-clip: text; background-clip: text; color: transparent;
      line-height: 1;
      filter: drop-shadow(0 0 40px rgba(107,140,255,0.45));
    }
    #date-display {
      font-size: 0.92rem; font-weight: 400; color: var(--muted);
      letter-spacing: 0.08em; margin-top: 10px;
      text-transform: uppercase;
    }

    /* ─── Lists ─── */
    #lists-panel {
      grid-column: 1;
      display: flex; flex-direction: column;
      overflow: hidden;
    }

    /* Scrollable notes wrapper — mirrors tuya-wrapper/tuya-content */
    #notes-wrapper {
      flex: 1; min-height: 0;
      position: relative;
    }
    #notes-content {
      height: 100%;
      overflow-y: auto; overflow-x: hidden;
      scrollbar-width: none;
      display: flex; flex-direction: column; gap: 10px;
      padding-top: 3px; padding-bottom: 4px;
    }
    #notes-content::-webkit-scrollbar { display: none; }

    /* Hover scroll zones — same as tuya */
    #notes-scroll-top, #notes-scroll-bottom {
      position: absolute; left: 0; right: 0; height: 48px;
      z-index: 12; pointer-events: all;
    }
    #notes-scroll-top    { top: 0; }
    #notes-scroll-bottom { bottom: 0; }
    #notes-scroll-top.hidden, #notes-scroll-bottom.hidden { pointer-events: none; }

    /* Dynamic note blocks — generated by JS */
    .list-block {
      flex-shrink: 0;           /* never compress */
      display: flex; flex-direction: column;
    }
    .list-label {
      font-size: 0.58rem; font-weight: 700;
      letter-spacing: 0.16em; text-transform: uppercase;
      color: var(--muted); margin-bottom: 6px; padding-left: 2px;
      flex-shrink: 0;
    }
    .list-box {
      /* 4 lines minimum: font-size 0.82rem * line-height 1.65 * 4 + padding */
      min-height: calc(0.82rem * 1.65 * 4 + 20px);
      background: rgba(255,255,255,0.025);
      border: 1px solid var(--border);
      border-radius: 10px;
      padding: 10px 12px;
      font-family: var(--font);
      font-size: 0.82rem; line-height: 1.65;
      color: var(--text);
      outline: none;
      overflow-y: visible;      /* show full content, panel scrolls */
      overflow-x: hidden;
      white-space: pre-wrap; word-break: break-word;
      transition: border-color 0.2s, box-shadow 0.2s;
      user-select: text;
    }
    .list-box:focus {
      border-color: rgba(107,140,255,0.4);
      box-shadow: 0 0 0 2px rgba(107,140,255,0.07), 0 0 18px rgba(107,140,255,0.05);
      background: rgba(255,255,255,0.035);
    }

    /* Empty/loading state */
    #notes-loading {
      font-size: 0.72rem; color: var(--muted);
      text-align: center; padding: 20px 0;
      letter-spacing: 0.06em;
    }

    /* ─── Notes panel header row ─── */
    #notes-header {
      display: flex; align-items: center;
      margin-bottom: 16px; flex-shrink: 0;
    }
    #notes-header .panel-title { margin-bottom: 0; flex: 1; }

    #btn-new-note {
      width: 22px; height: 22px; border-radius: 6px;
      background: rgba(107,140,255,0.1);
      border: 1px solid rgba(107,140,255,0.2);
      color: var(--accent); font-size: 0.9rem; line-height: 1;
      display: flex; align-items: center; justify-content: center;
      cursor: pointer;
      transition: background 0.2s, border-color 0.2s, box-shadow 0.2s;
      flex-shrink: 0;
    }
    #btn-new-note:hover {
      background: rgba(107,140,255,0.22);
      border-color: rgba(107,140,255,0.45);
      box-shadow: 0 0 10px rgba(107,140,255,0.15);
    }

    /* Delete × button on each note label row */
    .list-label-row {
      display: flex; align-items: center;
      margin-bottom: 6px; flex-shrink: 0;
    }
    .list-label-row .list-label { margin-bottom: 0; flex: 1; }
    .btn-delete-note, .btn-rename-note {
      width: 16px; height: 16px; border-radius: 4px;
      background: transparent; border: none;
      color: var(--muted); font-size: 0.7rem; line-height: 1;
      display: flex; align-items: center; justify-content: center;
      cursor: pointer; opacity: 0;
      transition: opacity 0.15s, color 0.15s, background 0.15s;
      flex-shrink: 0;
    }
    .list-block:hover .btn-delete-note,
    .list-block:hover .btn-rename-note { opacity: 1; }
    .btn-delete-note:hover { color: #ff6b6b; }
    .btn-delete-note.armed { color: #22c55e; opacity: 1; }
    .btn-rename-note:hover { color: var(--accent); }
    /* Inline rename — label becomes an input */
    .list-label[contenteditable="true"] {
      outline: none;
      border-bottom: 1px solid rgba(107,140,255,0.5);
      color: var(--accent);
      cursor: text;
      min-width: 30px;
    }

    /* Inline create form */
    #new-note-form {
      display: none; flex-direction: row; gap: 6px;
      align-items: center; flex-shrink: 0;
      margin-bottom: 4px;
    }
    #new-note-form.visible { display: flex; }
    #new-note-input {
      flex: 1;
      background: rgba(255,255,255,0.04);
      border: 1px solid rgba(107,140,255,0.3);
      border-radius: 8px;
      padding: 5px 10px;
      font-family: var(--font); font-size: 0.78rem;
      color: var(--text); outline: none;
      letter-spacing: 0.04em;
    }
    #new-note-input::placeholder { color: var(--muted); }
    #new-note-input:focus { border-color: rgba(107,140,255,0.6); }
    #btn-confirm-note {
      padding: 5px 10px; border-radius: 8px;
      background: rgba(107,140,255,0.15);
      border: 1px solid rgba(107,140,255,0.3);
      color: var(--accent); font-family: var(--font);
      font-size: 0.72rem; font-weight: 700;
      cursor: pointer; letter-spacing: 0.06em;
      transition: background 0.2s, border-color 0.2s;
    }
    #btn-confirm-note:hover { background: rgba(107,140,255,0.28); border-color: rgba(107,140,255,0.5); }
    #btn-cancel-note {
      padding: 5px 8px; border-radius: 8px;
      background: transparent; border: 1px solid var(--border);
      color: var(--muted); font-family: var(--font);
      font-size: 0.72rem; cursor: pointer;
      transition: border-color 0.2s, color 0.2s;
    }
    #btn-cancel-note:hover { border-color: rgba(255,255,255,0.2); color: var(--text); }

    /* ─── Smart Devices panel ─── */
    #tuya-panel {
      grid-column: 3;
      display: flex; flex-direction: column;
      overflow: hidden;
    }
    #tuya-wrapper {
      flex: 1; min-height: 0;
      position: relative;
    }
    #tuya-content {
      height: 100%;
      overflow-y: auto; overflow-x: hidden;
      scrollbar-width: none;
      padding-top: 3px;
    }
    #tuya-content::-webkit-scrollbar { display: none; }

    /* Tuya hover scroll zones */
    #scroll-zone-top, #scroll-zone-bottom {
      position: absolute; left: 0; right: 0; height: 48px;
      z-index: 12; pointer-events: all;
    }
    #scroll-zone-top    { top: 0; }
    #scroll-zone-bottom { bottom: 0; }
    #scroll-zone-top.hidden, #scroll-zone-bottom.hidden { pointer-events: none; }

    #server-status {
      display: flex; align-items: center; gap: 8px;
      margin-bottom: 16px; flex-shrink: 0;
    }
    .status-dot {
      width: 7px; height: 7px; border-radius: 50%;
      background: #ff4545; flex-shrink: 0;
      transition: background 0.3s;
      box-shadow: 0 0 8px rgba(255,69,69,0.6);
    }
    .status-dot.online {
      background: var(--accent2);
      box-shadow: 0 0 8px rgba(91,230,192,0.6);
    }

    #status-text { font-size: 0.68rem; color: var(--muted); letter-spacing: 0.05em; }

    #scripts-list {
      display: flex; flex-direction: column; gap: 8px;
    }

    /* Script buttons — match walterck.com card hover style */
    .script-btn, .script-btn * {
      cursor: pointer;
    }
    .script-btn {
      display: flex; align-items: center; gap: 11px;
      padding: 11px 14px;
      background: rgba(255,255,255,0.02);
      border: 1px solid var(--border);
      border-radius: 12px;
      color: var(--text); font-family: var(--font);
      font-size: 0.8rem; font-weight: 600;
      cursor: pointer; text-align: left;
      transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1);
      letter-spacing: 0.02em;
      position: relative; overflow: hidden;
    }
    .script-btn::after {
      content: ''; position: absolute; inset: 0;
      background: linear-gradient(90deg, rgba(107,140,255,0) 0%, rgba(107,140,255,0.06) 100%);
      opacity: 0; transition: opacity 0.3s;
    }
    .script-btn:hover {
      border-color: var(--accent);
      background: rgba(255,255,255,0.05);
      transform: translateY(-2px);
      box-shadow: var(--shadow);
    }
    .script-btn:hover::after { opacity: 1; }
    .script-btn:active { transform: translateY(-1px) scale(0.99); }
    .script-btn.fired {
      border-color: #22c55e;
      background: rgba(34,197,94,0.12);
      box-shadow: 0 0 18px rgba(34,197,94,0.3);
    }

    .btn-icon {
      width: 28px; height: 28px; border-radius: 8px;
      background: rgba(107,140,255,0.1);
      border: 1px solid rgba(107,140,255,0.18);
      display: flex; align-items: center; justify-content: center;
      flex-shrink: 0; font-size: 0.85rem;
      transition: background 0.2s;
    }
    .script-btn:hover .btn-icon {
      background: rgba(107,140,255,0.2);
      border-color: rgba(107,140,255,0.35);
    }
    .btn-name { flex: 1; overflow: hidden; text-overflow: ellipsis; white-space: nowrap; }
    .btn-arrow { font-size: 0.6rem; color: var(--muted); opacity: 0; transition: opacity 0.2s; }
    .script-btn:hover .btn-arrow { opacity: 1; }

    .no-server {
      font-size: 0.75rem; color: var(--muted); line-height: 1.65;
      padding: 14px 0; text-align: center;
    }
    .no-server strong { color: var(--accent); display: block; margin-bottom: 8px; font-size: 0.8rem; }

    /* ─── Particles ─── */
    .particle {
      position: fixed; pointer-events: none; z-index: 1;
      border-radius: 50%;
      background: var(--accent);
      animation: float-up linear infinite;
    }
    @keyframes float-up {
      0%   { transform: translateY(0) scale(1); opacity: var(--op); }
      100% { transform: translateY(-100vh) scale(0); opacity: 0; }
    }

    /* ─── Lightning flash ─── */
    #flash {
      position: fixed; inset: 0; z-index: 50;
      background: rgba(107,140,255,0.05);
      pointer-events: none; opacity: 0;
      transition: opacity 0.05s;
    }

    /* ─── Cat photo ─── */
    #photo-bg {
      position: fixed;
      bottom: -160px;
      left: 50%;
      transform: translateX(-50%);
      height: 80vh;
      width: auto;
      z-index: 3;
      pointer-events: none;
      opacity: 0.5;
      mix-blend-mode: screen;
      -webkit-mask-image: radial-gradient(ellipse 80% 72% at 57% 58%, black 45%, rgba(0,0,0,0.5) 65%, transparent 90%);
      mask-image: radial-gradient(ellipse 75% 70% at 60% 25%, black 40%, rgba(0, 0, 0, 0.5) 62%, transparent 85%)
    }

    /* ─── Responsive ─── */
    @media (max-width: 1200px) {
      #app { grid-template-columns: 260px 1fr 240px; padding: 20px; gap: 16px; }
    }
    @media (max-width: 900px) {
      #app {
        grid-template-columns: 1fr 1fr;
        grid-template-rows: auto 1fr;
        overflow-y: auto;
      }
      #clock-panel { grid-column: 1 / 3; grid-row: 1; height: auto; min-height: 120px; }
      #lists-panel { grid-column: 1; grid-row: 2; }
      #tuya-panel  { grid-column: 2; grid-row: 2; }
    }
  </style>
</head>
<body>

  <!-- Background -->
  <canvas id="bg-canvas"></canvas>
  <div class="glow-orb a"></div>
  <div class="glow-orb b"></div>
  <div class="glow-orb c"></div>
  <div class="grid-overlay"></div>
  <div class="rain" id="rain"></div>
  <div class="scanline"></div>
  <div id="flash"></div>

  <img id="photo-bg" src="cat.png" alt="">

  <!-- App -->
  <div id="app">

    <!-- ── NOTES (left) — dynamically populated ── -->
    <div id="lists-panel" class="panel">
      <div id="notes-header">
        <div class="panel-title">📋Notes</div>
        <button id="btn-new-note" title="New note">+</button>
      </div>
      <div id="new-note-form">
        <input id="new-note-input" type="text" placeholder="Note name…" spellcheck="false" maxlength="40">
        <button id="btn-confirm-note">Add</button>
        <button id="btn-cancel-note">✕</button>
      </div>
      <div id="notes-wrapper">
        <div id="notes-scroll-top"></div>
        <div id="notes-scroll-bottom"></div>
        <div id="notes-content">
          <div id="notes-loading">Loading…</div>
        </div>
      </div>
    </div>

    <!-- ── CLOCK (centre, spans full height) ── -->
    <div id="clock-panel">
      <div id="time-display">00:00:00</div>
      <div id="date-display">Thursday, 16 April</div>
    </div>

    <!-- ── LIGHTING & SMART DEVICES (right) ── -->
    <div id="tuya-panel" class="panel">
      <div class="panel-title">⚡Smart Devices &amp; Lighting</div>
      <div id="server-status">
        <div class="status-dot" id="status-dot"></div>
        <span id="status-text">Connecting…</span>
      </div>
      <div id="tuya-wrapper">
        <div id="scroll-zone-top"></div>
        <div id="scroll-zone-bottom"></div>
        <div id="tuya-content" style="position:relative;">
          <div id="scripts-list">
            <div class="no-server">
              <strong>Server not detected</strong>
              Run <code style="color:var(--accent2)">server.py</code> to enable scene buttons.
            </div>
          </div>
        </div>
      </div>
    </div>

  </div>

  <script>
  /* ══════════════════════════════════════════
     RAIN
  ══════════════════════════════════════════ */
  (function () {
    const rain = document.getElementById('rain');
    for (let i = 0; i < 120; i++) {
      const d = document.createElement('div');
      d.className = 'drop';
      d.style.left = Math.random() * 100 + 'vw';
      const dur = (Math.random() * 2.5 + 1.8).toFixed(2);
      d.style.animationDuration = dur + 's';
      d.style.animationDelay = (-Math.random() * 5).toFixed(2) + 's';
      d.style.opacity = (Math.random() * 0.45 + 0.04).toFixed(2);
      d.style.height = (Math.random() * 22 + 14) + 'px';
      rain.appendChild(d);
    }
  })();

  /* ══════════════════════════════════════════
     FLOATING PARTICLES
  ══════════════════════════════════════════ */
  (function () {
    for (let i = 0; i < 20; i++) {
      const p = document.createElement('div');
      p.className = 'particle';
      const size = Math.random() * 2.5 + 0.5;
      const op   = (Math.random() * 0.12 + 0.02).toFixed(3);
      p.style.cssText = `
        left: ${Math.random() * 100}%;
        bottom: -10px;
        width: ${size}px; height: ${size}px;
        --op: ${op};
        animation-duration: ${(Math.random() * 18 + 10).toFixed(1)}s;
        animation-delay: ${(-Math.random() * 20).toFixed(1)}s;
      `;
      document.body.appendChild(p);
    }
  })();

  /* ══════════════════════════════════════════
     BACKGROUND CANVAS — aurora lines
  ══════════════════════════════════════════ */
  (function () {
    const cvs = document.getElementById('bg-canvas');
    const ctx = cvs.getContext('2d');
    let W, H, t = 0;

    function resize() {
      W = cvs.width  = window.innerWidth;
      H = cvs.height = window.innerHeight;
    }
    window.addEventListener('resize', resize);
    resize();

    const lines = Array.from({ length: 5 }, (_, i) => ({
      phase: (i / 5) * Math.PI * 2,
      amp:   60 + i * 20,
      speed: 0.0004 + i * 0.00015,
      y:     0.2 + i * 0.15,
      alpha: 0.015 + i * 0.005,
    }));

    function draw() {
      ctx.clearRect(0, 0, W, H);
      t += 0.6;
      lines.forEach(l => {
        ctx.beginPath();
        for (let x = 0; x <= W; x += 3) {
          const y = H * l.y + Math.sin(x * 0.004 + t * l.speed * 1000 + l.phase) * l.amp;
          x === 0 ? ctx.moveTo(x, y) : ctx.lineTo(x, y);
        }
        ctx.strokeStyle = `rgba(107,140,255,${l.alpha})`;
        ctx.lineWidth = 1;
        ctx.stroke();
      });
      requestAnimationFrame(draw);
    }
    draw();
  })();

  /* ══════════════════════════════════════════
     CLOCK
  ══════════════════════════════════════════ */
  const DAYS   = ['Sunday','Monday','Tuesday','Wednesday','Thursday','Friday','Saturday'];
  const MONTHS = ['January','February','March','April','May','June',
                  'July','August','September','October','November','December'];

  function pad(n) { return String(n).padStart(2, '0'); }

  function updateClock() {
    const now = new Date();
    document.getElementById('time-display').textContent =
      `${pad(now.getHours())}:${pad(now.getMinutes())}:${pad(now.getSeconds())}`;
    document.getElementById('date-display').textContent =
      `${DAYS[now.getDay()]}, ${now.getDate()} ${MONTHS[now.getMonth()]}`;
  }

  setInterval(updateClock, 1000);
  updateClock();

  /* ══════════════════════════════════════════
     OCCASIONAL LIGHTNING FLASH
  ══════════════════════════════════════════ */
  (function lightningLoop() {
    const flash = document.getElementById('flash');
    const delay = 8000 + Math.random() * 20000;
    setTimeout(() => {
      flash.style.opacity = '1';
      setTimeout(() => {
        flash.style.opacity = '0';
        setTimeout(() => {
          flash.style.opacity = '1';
          setTimeout(() => { flash.style.opacity = '0'; lightningLoop(); }, 80);
        }, 120);
      }, 60);
    }, delay);
  })();

  /* ══════════════════════════════════════════
     NOTES — dynamic, driven by server /notes
  ══════════════════════════════════════════ */
  (function () {
    const NOTES_URL  = 'http://localhost:8765/notes';
    const panel      = document.getElementById('notes-content');
    const loadingEl  = document.getElementById('notes-loading');
    const newForm    = document.getElementById('new-note-form');
    const newInput   = document.getElementById('new-note-input');
    const btnNew     = document.getElementById('btn-new-note');
    const btnConfirm = document.getElementById('btn-confirm-note');
    const btnCancel  = document.getElementById('btn-cancel-note');

    // label → { block, box, lbl }
    const boxes      = new Map();
    const saveTimers = new Map();  // tracks in-flight / pending saves — key = label

    // ── Hover-to-scroll — exact same pattern as tuya panel ───────────
    (function () {
      const content = document.getElementById('notes-content');
      const zTop    = document.getElementById('notes-scroll-top');
      const zBot    = document.getElementById('notes-scroll-bottom');
      const SPEED   = 12;
      let rafId     = null;
      let dir       = 0;

      function updateZones() {
        zTop.classList.toggle('hidden', content.scrollTop <= 0);
        zBot.classList.toggle('hidden', content.scrollTop + content.clientHeight >= content.scrollHeight - 1);
      }

      function tick() {
        content.scrollTop += dir * SPEED;
        updateZones();
        rafId = requestAnimationFrame(tick);
      }

      function start(d) { dir = d; if (!rafId) rafId = requestAnimationFrame(tick); }
      function stop()   { if (rafId) { cancelAnimationFrame(rafId); rafId = null; } }

      zTop.addEventListener('mouseenter', () => start(-1));
      zTop.addEventListener('mouseleave', stop);
      zBot.addEventListener('mouseenter', () => start(1));
      zBot.addEventListener('mouseleave', stop);
      content.addEventListener('scroll', updateZones);

      const obs = new MutationObserver(updateZones);
      obs.observe(content, { childList: true, subtree: true });
      updateZones();
    })();

    // ── Create note form ──────────────────────────────────────────────
    btnNew.addEventListener('click', () => {
      newForm.classList.add('visible');
      newInput.value = '';
      newInput.focus();
    });
    btnCancel.addEventListener('click', () => {
      newForm.classList.remove('visible');
      newInput.value = '';
    });
    btnConfirm.addEventListener('click', confirmCreate);
    newInput.addEventListener('keydown', e => {
      if (e.key === 'Enter') confirmCreate();
      if (e.key === 'Escape') btnCancel.click();
    });

    async function confirmCreate() {
      const label = newInput.value.trim();
      if (!label || boxes.has(label)) return;
      newForm.classList.remove('visible');
      newInput.value = '';
      const { block, box } = makeBox(label, '');
      panel.appendChild(block);
      boxes.set(label, { block, box });
      await saveNote(label, '');
    }

    // ── Delete note ───────────────────────────────────────────────────
    async function deleteNote(label) {
      const entry = boxes.get(label);
      if (!entry) return;
      entry.block.remove();
      boxes.delete(label);
      saveTimers.delete(label);
      try {
        await fetch(`${NOTES_URL}/${encodeURIComponent(label)}`, { method: 'DELETE' });
      } catch {}
    }

    // ── Save note — tracks pending writes so sync can't overwrite ─────
    async function saveNote(label, content) {
      // mark as dirty so loadNotes skips this label while save is in flight
      saveTimers.set(label, (saveTimers.get(label) || 0) + 1);
      try {
        await fetch(`${NOTES_URL}/${encodeURIComponent(label)}`, {
          method: 'POST',
          body: content
        });
      } catch {}
      const count = saveTimers.get(label);
      if (count <= 1) saveTimers.delete(label);
      else saveTimers.set(label, count - 1);
    }

    // ── Build a note block ────────────────────────────────────────────
    function makeBox(labelArg, content) {
      let label = labelArg;
      const block = document.createElement('div');
      block.className = 'list-block';

      const labelRow = document.createElement('div');
      labelRow.className = 'list-label-row';

      // Inline-editable label
      const lbl = document.createElement('div');
      lbl.className = 'list-label';
      lbl.textContent = label.replace(/^\d+/, '').trim();

      // ── Rename: click ✎ → label becomes editable ──────────────────
      const renameBtn = document.createElement('button');
      renameBtn.className = 'btn-rename-note';
      renameBtn.title = 'Rename note';
      renameBtn.textContent = '✎';

      renameBtn.addEventListener('click', (e) => {
        e.stopPropagation();
        lbl.contentEditable = 'true';
        lbl.focus();
        // select all text so user can just type the new name
        const range = document.createRange();
        const sel   = window.getSelection();
        range.selectNodeContents(lbl);
        sel.removeAllRanges();
        sel.addRange(range);
      });

      lbl.addEventListener('keydown', async (e) => {
        if (e.key === 'Enter') { e.preventDefault(); lbl.blur(); }
        if (e.key === 'Escape') { lbl.textContent = label.replace(/^\d+/, '').trim(); lbl.blur(); }
      });

      lbl.addEventListener('blur', async () => {
        lbl.contentEditable = 'false';
        const userTyped = lbl.textContent.trim();
        if (!userTyped) { lbl.textContent = label.replace(/^\d+/, '').trim(); return; }

        // Preserve any leading numeric prefix (e.g. "1 " or "12 ") from the original filename key
        const prefixMatch = label.match(/^(\d+\s*)/);
        const prefix = prefixMatch ? prefixMatch[1] : '';
        const newLabel = prefix + userTyped;

        if (newLabel === label) { lbl.textContent = label.replace(/^\d+/, '').trim(); return; }
        if (boxes.has(newLabel)) { lbl.textContent = label.replace(/^\d+/, '').trim(); return; }

        // Rename: save under new name, delete old
        const { box } = boxes.get(label);
        const currentContent = box.innerText;
        boxes.delete(label);
        boxes.set(newLabel, { block, box, lbl });
        const oldLabel = label;
        label = newLabel;

        await saveNote(newLabel, currentContent);
        await fetch(`${NOTES_URL}/${encodeURIComponent(oldLabel)}`, { method: 'DELETE' }).catch(() => {});
      });

      // ── Delete: first click arms (✕ → ✓ green), second click deletes ──
      const delBtn = document.createElement('button');
      delBtn.className = 'btn-delete-note';
      delBtn.title = 'Delete note';
      delBtn.textContent = '✕';
      let armTimer = null;

      delBtn.addEventListener('click', (e) => {
        e.stopPropagation();
        if (!delBtn.classList.contains('armed')) {
          // Arm it
          delBtn.classList.add('armed');
          delBtn.textContent = '✓';
          armTimer = setTimeout(() => {
            delBtn.classList.remove('armed');
            delBtn.textContent = '✕';
            armTimer = null;
          }, 1200);
        } else {
          // Confirmed — delete
          clearTimeout(armTimer);
          deleteNote(label);
        }
      });

      labelRow.appendChild(lbl);
      labelRow.appendChild(renameBtn);
      labelRow.appendChild(delBtn);

      const box = document.createElement('div');
      box.className = 'list-box';
      box.contentEditable = 'true';
      box.spellcheck = false;
      box.innerText = content;

      // Debounced save on input — uses a timer key per label
      let inputTimer = null;
      box.addEventListener('input', () => {
        clearTimeout(inputTimer);
        inputTimer = setTimeout(() => saveNote(label, box.innerText), 1500);
      });

      block.appendChild(labelRow);
      block.appendChild(box);
      return { block, box, lbl };
    }

    // ── Load notes — won't clobber boxes with pending saves ───────────
    async function loadNotes() {
      try {
        const r    = await fetch(NOTES_URL);
        const data = await r.json();

        if (loadingEl) loadingEl.style.display = 'none';

        Object.entries(data).forEach(([label, content]) => {
          if (!boxes.has(label)) {
            const { block, box, lbl } = makeBox(label, content);
            panel.appendChild(block);
            boxes.set(label, { block, box, lbl });
          } else {
            const { box } = boxes.get(label);
            // Skip update if this note has a pending save in flight
            if (saveTimers.has(label)) return;
            if (document.activeElement === box) return;
            if (box.innerText !== content) box.innerText = content;
          }
        });

        // Remove notes that no longer exist on server (only if no pending save)
        boxes.forEach((_, label) => {
          if (!Object.prototype.hasOwnProperty.call(data, label) && !saveTimers.has(label)) {
            boxes.get(label).block.remove();
            boxes.delete(label);
          }
        });

      } catch {
        if (loadingEl) loadingEl.textContent = 'Could not reach server';
      }
    }

    // Poll every 10s — no activity-triggered sync (that caused the revert bug)
    loadNotes();
    setInterval(loadNotes, 10000);
  })();

  /* ══════════════════════════════════════════
     SMART DEVICES / TUYA SERVER
  ══════════════════════════════════════════ */
  const SERVER = 'http://localhost:8765';
  const dot    = document.getElementById('status-dot');
  const stxt   = document.getElementById('status-text');
  const sList  = document.getElementById('scripts-list');

  // Custom device order — matched against script filenames (case-insensitive, partial)
  const DEVICE_ORDER = [
    'filters on', 'filters off', 'brightness',
    'lights on', 'lights off', 'lights min', 'lights max',
    'inferno', 'ember', 'viridian', 'cerulean', 'nebula',
    'phone on', 'phone off',
    'powerhouse on', 'powerhouse off',
    'phone 2 on', 'phone 2 off',
    'toothbrush on', 'toothbrush off',
    'powerboard bootup', 'powerboard shutdown'
  ];

  function sortScripts(scripts) {
    return [...scripts].sort((a, b) => {
      const labelA = a.replace(/\.(bat|lnk|vbs)$/i, '').replace(/[-_]/g, ' ').toLowerCase();
      const labelB = b.replace(/\.(bat|lnk|vbs)$/i, '').replace(/[-_]/g, ' ').toLowerCase();
      const iA = DEVICE_ORDER.findIndex(o => labelA.includes(o));
      const iB = DEVICE_ORDER.findIndex(o => labelB.includes(o));
      if (iA === -1 && iB === -1) return labelA.localeCompare(labelB);
      if (iA === -1) return 1;
      if (iB === -1) return -1;
      return iA - iB;
    });
  }

  // 💡 for anything light/ambience-related; 🛡️ for everything else
  function scriptIcon(name) {
    const n = name.toLowerCase().replace(/[-_.]/g, ' ').replace(/\.(bat|lnk|vbs)$/i, '');
    
    const displayWords = ['bright', 'brightness', 'filter', 'filters'];
    
    const lightWords = [
      'light', 'lights', 'lamp', 'bulb',
      'ember', 'inferno', 'nebula', 'viridian', 'cerulean',
      'glow', 'dim', 'warm', 'cool', 'white',
      'colour', 'color', 'hue', 'kelvin', 'lumen'
    ];
  
    if (displayWords.some(w => n.includes(w))) return '🔅';
    if (lightWords.some(w => n.includes(w))) return '💡';
    
    return '🛡️';
  }

  function buildScriptButtons(scripts) {
    sList.innerHTML = '';
    if (!scripts.length) {
      sList.innerHTML = '<div class="no-server">No scripts found in<br><code style="color:var(--accent2)">C:\\Scripts\\Tuya Scenes\\Bones</code></div>';
      return;
    }
    sortScripts(scripts).forEach(name => {
      const btn = document.createElement('button');
      btn.className = 'script-btn';
      const label = name.replace(/\.(bat|lnk|vbs)$/i, '').replace(/[-_]/g, ' ');
      btn.innerHTML = `
        <div class="btn-icon">${scriptIcon(name)}</div>
        <span class="btn-name">${label}</span>
        <span class="btn-arrow">▶</span>
      `;
      btn.addEventListener('click', () => runScript(name, btn));
      sList.appendChild(btn);
    });
  }

  function runScript(name, btn) {
    btn.classList.add('fired');
    fetch(`${SERVER}/run?script=${encodeURIComponent(name)}`)
      .then(r => r.json())
      .then(data => {
        if (data.ok) {
          triggerFlash();
          setTimeout(() => btn.classList.remove('fired'), 1800);
        } else {
          btn.classList.remove('fired');
        }
      })
      .catch(() => btn.classList.remove('fired'));
  }

  function triggerFlash() {
    const f = document.getElementById('flash');
    f.style.opacity = '1';
    setTimeout(() => f.style.opacity = '0', 80);
  }

  async function checkServer() {
   try {
     const r = await fetch(`${SERVER}/ping`, { signal: AbortSignal.timeout(4000) });
     const d = await r.json();
     if (d.alive) {
       dot.classList.add('online');
       stxt.textContent = 'Bridge online';
       if (sList.children.length < 2) loadScripts(); 
     }
   } catch {
     dot.classList.remove('online');
     stxt.textContent = 'Connecting...';
   }
 }

  async function loadScripts() {
    try {
      const r = await fetch(`${SERVER}/list`);
      const d = await r.json();
      buildScriptButtons(d.scripts || []);
    } catch {}
  }

  checkServer();
  setInterval(checkServer, 10000);

  /* ══════════════════════════════════════════
     HOVER-TO-SCROLL
  ══════════════════════════════════════════ */
  (function () {
    const content = document.getElementById('tuya-content');
    const zTop    = document.getElementById('scroll-zone-top');
    const zBot    = document.getElementById('scroll-zone-bottom');
    const SPEED   = 12;
    let rafId     = null;
    let dir       = 0;

    function updateZones() {
      zTop.classList.toggle('hidden', content.scrollTop <= 0);
      zBot.classList.toggle('hidden', content.scrollTop + content.clientHeight >= content.scrollHeight - 1);
    }

    function tick() {
      content.scrollTop += dir * SPEED;
      updateZones();
      rafId = requestAnimationFrame(tick);
    }

    function start(d) { dir = d; if (!rafId) rafId = requestAnimationFrame(tick); }
    function stop()   { if (rafId) { cancelAnimationFrame(rafId); rafId = null; } }

    zTop.addEventListener('mouseenter', () => start(-1));
    zTop.addEventListener('mouseleave', stop);
    zBot.addEventListener('mouseenter', () => start(1));
    zBot.addEventListener('mouseleave', stop);
    content.addEventListener('scroll', updateZones);

    const obs = new MutationObserver(updateZones);
    obs.observe(content, { childList: true, subtree: true });
    updateZones();
  })();

  </script>
