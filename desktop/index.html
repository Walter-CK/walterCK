<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <title>CK - Desktop</title>
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <link href="https://fonts.googleapis.com/css2?family=Oxanium:wght@300;400;600;700;800&display=swap" rel="stylesheet">
  <link rel="icon" href="../images/favicons/favicon.svg" type="image/svg+xml">
  <link rel="apple-touch-icon" href="../images/favicons/apple-touch-icon.png">
  <link rel="alternate icon" href="../images/favicons/favicon.ico" type="image/x-icon">
  <link rel="manifest" href="../images/favicons/site.webmanifest">
  <style>
    /* ─── Tokens — matches walterck.com ─── */
    :root {
      --bg:        #05070a;
      --bg2:       #0f1419;
      --accent:    #6b8cff;
      --accent2:   #5be6c0;
      --glow:      rgba(107,140,255,0.25);
      --glow2:     rgba(91,230,192,0.18);
      --text:      #e6eef6;
      --muted:     #94a3b8;
      --glass:     rgba(255,255,255,0.03);
      --border:    rgba(255,255,255,0.08);
      --radius:    16px;
      --shadow:    0 12px 40px rgba(0,0,0,0.6);
      --transition: 300ms cubic-bezier(0.4, 0, 0.2, 1);
      --font:      'Oxanium', sans-serif;
    }

    /* ─── Reset ─── */
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    html, body {
      width: 100%; height: 100%; overflow: hidden;
      font-family: var(--font);
      background: var(--bg);
      color: var(--text);
      user-select: none;
      -webkit-font-smoothing: antialiased;
    }

    /* ─── Background layers ─── */
    #bg-canvas { position: fixed; inset: 0; z-index: 0; pointer-events: none; }

    .glow-orb {
      position: fixed; border-radius: 50%; filter: blur(90px);
      pointer-events: none; z-index: 0;
    }
    .glow-orb.a {
      width: 600px; height: 600px;
      top: -150px; left: -100px;
      background: radial-gradient(circle, rgba(107,140,255,0.10) 0%, transparent 70%);
    }
    .glow-orb.b {
      width: 500px; height: 500px;
      bottom: -100px; right: -80px;
      background: radial-gradient(circle, rgba(91,230,192,0.08) 0%, transparent 70%);
    }
    .glow-orb.c {
      width: 300px; height: 300px;
      top: 40%; left: 50%; transform: translate(-50%,-50%);
      background: radial-gradient(circle, rgba(107,140,255,0.05) 0%, transparent 70%);
    }

    /* Grid overlay */
    .grid-overlay {
      position: fixed; inset: 0; z-index: 0; pointer-events: none;
      background-image:
        linear-gradient(rgba(107,140,255,0.025) 1px, transparent 1px),
        linear-gradient(90deg, rgba(107,140,255,0.025) 1px, transparent 1px);
      background-size: 60px 60px;
    }

    /* Rain */
    .rain { position: fixed; inset: 0; z-index: 1; pointer-events: none; overflow: hidden; }
    .drop {
      position: absolute; top: -40px;
      width: 1px; height: 32px;
      background: linear-gradient(to bottom, transparent, rgba(107,140,255,0.3));
      animation: fall linear infinite;
      border-radius: 1px;
    }
    @keyframes fall {
      to { transform: translateY(110vh); }
    }

    /* Scan line */
    .scanline {
      position: fixed; inset: 0; z-index: 2; pointer-events: none;
      background: repeating-linear-gradient(
        0deg, transparent, transparent 2px,
        rgba(0,0,0,0.025) 2px, rgba(0,0,0,0.025) 4px
      );
    }

    /* ─── Layout ─── */
    #app {
      position: relative; z-index: 10;
      width: 100vw; height: 100vh;
      display: grid;
      grid-template-columns: 300px 1fr 280px;
      grid-template-rows: 1fr;
      gap: 20px;
      padding: 28px;
      pointer-events: none;
    }
    #app > * { pointer-events: all; }

    /* ─── Panel base — matches walterck.com .card ─── */
    .panel {
      background: rgba(255,255,255,0.02);
      border: 1px solid var(--border);
      border-radius: var(--radius);
      backdrop-filter: blur(12px);
      -webkit-backdrop-filter: blur(12px);
      padding: 20px;
      position: relative;
      overflow: hidden;
      transition: var(--transition);
    }
    .panel::before {
      content: '';
      position: absolute; inset: 0;
      background: linear-gradient(135deg, rgba(107,140,255,0.03) 0%, transparent 60%);
      pointer-events: none;
      border-radius: var(--radius);
    }
    .panel-title {
      font-size: 0.6rem; font-weight: 700;
      letter-spacing: 0.16em; text-transform: uppercase;
      color: var(--muted); margin-bottom: 16px;
      display: flex; align-items: center; gap: 7px;
    }

    /* ─── Clock — spans full height, centred ─── */
    #clock-panel {
      grid-column: 2;
      display: flex; flex-direction: column; align-items: center;
      justify-content: flex-start; padding: 14vh 28px 22px;
      background: transparent; border: none;
      backdrop-filter: none;
    }
    #clock-panel::before { display: none; }

    #time-display {
      font-size: clamp(4rem, 7vw, 7rem);
      font-weight: 800; letter-spacing: -0.04em;
      background: linear-gradient(135deg, #ffffff 0%, var(--accent) 65%);
      -webkit-background-clip: text; background-clip: text; color: transparent;
      line-height: 1;
      filter: drop-shadow(0 0 40px rgba(107,140,255,0.45));
    }
    #date-display {
      font-size: 0.92rem; font-weight: 400; color: var(--muted);
      letter-spacing: 0.08em; margin-top: 10px;
      text-transform: uppercase;
    }

    /* ─── Lists ─── */
    #lists-panel {
      grid-column: 1;
      display: flex; flex-direction: column; gap: 10px;
      overflow: hidden;
    }

    .list-block {
      flex: 1;
      display: flex; flex-direction: column;
      min-height: 0;
    }
    .list-label {
      font-size: 0.58rem; font-weight: 700;
      letter-spacing: 0.16em; text-transform: uppercase;
      color: var(--muted); margin-bottom: 6px; padding-left: 2px;
      flex-shrink: 0;
    }
    .list-box {
      flex: 1;
      background: rgba(255,255,255,0.025);
      border: 1px solid var(--border);
      border-radius: 10px;
      padding: 10px 12px;
      font-family: var(--font);
      font-size: 0.82rem; line-height: 1.65;
      color: var(--text);
      outline: none;
      overflow-y: auto;
      overflow-x: hidden;
      white-space: pre-wrap; word-break: break-word;
      transition: border-color 0.2s, box-shadow 0.2s;
      user-select: text;
      scrollbar-width: none;
      min-height: 0;
    }
    .list-box::-webkit-scrollbar { display: none; }
    .list-box:focus {
      border-color: rgba(107,140,255,0.4);
      box-shadow: 0 0 0 2px rgba(107,140,255,0.07), 0 0 18px rgba(107,140,255,0.05);
      background: rgba(255,255,255,0.035);
    }
    /* Hover scroll zones */
    #scroll-zone-top, #scroll-zone-bottom {
      position: absolute; left: 0; right: 0; height: 48px;
      z-index: 20; pointer-events: all;
    }
    #scroll-zone-top    { top: 0; }
    #scroll-zone-bottom { bottom: 0; }
    #scroll-zone-top.hidden, #scroll-zone-bottom.hidden { pointer-events: none; }

    /* ─── Smart Devices panel ─── */
    #tuya-panel {
      grid-column: 3;
      display: flex; flex-direction: column;
      overflow: hidden;
    }
    #tuya-wrapper {
      flex: 1; min-height: 0;
      position: relative;
    }
    #tuya-content {
      height: 100%;
      overflow-y: auto; overflow-x: hidden;
      scrollbar-width: none;
      padding-top: 3px;
    }
    #tuya-content::-webkit-scrollbar { display: none; }

    #server-status {
      display: flex; align-items: center; gap: 8px;
      margin-bottom: 16px; flex-shrink: 0;
    }
    .status-dot {
      width: 7px; height: 7px; border-radius: 50%;
      background: #ff4545; flex-shrink: 0;
      transition: background 0.3s;
      box-shadow: 0 0 8px rgba(255,69,69,0.6);
    }
    .status-dot.online {
      background: var(--accent2);
      box-shadow: 0 0 8px rgba(91,230,192,0.6);
    }
    #status-text { font-size: 0.68rem; color: var(--muted); letter-spacing: 0.05em; }

    #scripts-list {
      display: flex; flex-direction: column; gap: 8px;
    }

    /* Script buttons — match walterck.com card hover style */
    .script-btn, .script-btn * {
      cursor: pointer;
    }
    .script-btn {
      display: flex; align-items: center; gap: 11px;
      padding: 11px 14px;
      background: rgba(255,255,255,0.02);
      border: 1px solid var(--border);
      border-radius: 12px;
      color: var(--text); font-family: var(--font);
      font-size: 0.8rem; font-weight: 600;
      cursor: pointer; text-align: left;
      transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1);
      letter-spacing: 0.02em;
      position: relative; overflow: hidden;
    }
    .script-btn::after {
      content: ''; position: absolute; inset: 0;
      background: linear-gradient(90deg, rgba(107,140,255,0) 0%, rgba(107,140,255,0.06) 100%);
      opacity: 0; transition: opacity 0.3s;
    }
    .script-btn:hover {
      border-color: var(--accent);
      background: rgba(255,255,255,0.05);
      transform: translateY(-2px);
      box-shadow: var(--shadow);
    }
    .script-btn:hover::after { opacity: 1; }
    .script-btn:active { transform: translateY(-1px) scale(0.99); }
    .script-btn.fired {
      border-color: #22c55e;
      background: rgba(34,197,94,0.12);
      box-shadow: 0 0 18px rgba(34,197,94,0.3);
    }

    .btn-icon {
      width: 28px; height: 28px; border-radius: 8px;
      background: rgba(107,140,255,0.1);
      border: 1px solid rgba(107,140,255,0.18);
      display: flex; align-items: center; justify-content: center;
      flex-shrink: 0; font-size: 0.85rem;
      transition: background 0.2s;
    }
    .script-btn:hover .btn-icon {
      background: rgba(107,140,255,0.2);
      border-color: rgba(107,140,255,0.35);
    }
    .btn-name { flex: 1; overflow: hidden; text-overflow: ellipsis; white-space: nowrap; }
    .btn-arrow { font-size: 0.6rem; color: var(--muted); opacity: 0; transition: opacity 0.2s; }
    .script-btn:hover .btn-arrow { opacity: 1; }

    .no-server {
      font-size: 0.75rem; color: var(--muted); line-height: 1.65;
      padding: 14px 0; text-align: center;
    }
    .no-server strong { color: var(--accent); display: block; margin-bottom: 8px; font-size: 0.8rem; }

    /* ─── Particles ─── */
    .particle {
      position: fixed; pointer-events: none; z-index: 1;
      border-radius: 50%;
      background: var(--accent);
      animation: float-up linear infinite;
    }
    @keyframes float-up {
      0%   { transform: translateY(0) scale(1); opacity: var(--op); }
      100% { transform: translateY(-100vh) scale(0); opacity: 0; }
    }

    /* ─── Lightning flash ─── */
    #flash {
      position: fixed; inset: 0; z-index: 50;
      background: rgba(107,140,255,0.05);
      pointer-events: none; opacity: 0;
      transition: opacity 0.05s;
    }

    /* ─── Cat photo ─── */
    #photo-bg {
      position: fixed;
      bottom: -160px;
      left: 50%;
      transform: translateX(-50%);
      height: 80vh;
      width: auto;
      z-index: 3;
      pointer-events: none;
      opacity: 0.5;
      mix-blend-mode: screen;
      -webkit-mask-image: radial-gradient(ellipse 80% 72% at 57% 58%, black 45%, rgba(0,0,0,0.5) 65%, transparent 90%);
      mask-image: radial-gradient(ellipse 75% 70% at 60% 25%, black 40%, rgba(0, 0, 0, 0.5) 62%, transparent 85%)
    }

    /* ─── Back Button ─── */
    .back-btn {
      position: absolute;
      top: 28px;
      left: 28px;
      z-index: 100;
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 6px; /* Space between icon and text */
      padding: 0 16px 0 12px; /* Pill shape padding */
      height: 40px; /* Slimmer height */
      border-radius: 20px; /* Fully rounded pill */
      
      /* Much better visibility */
      background: rgba(107, 140, 255, 0.12); /* Subtle blue tint */
      border: 1px solid rgba(107, 140, 255, 0.3); /* Clearer border */
      backdrop-filter: blur(12px);
      
      /* Typography */
      color: var(--text);
      font-size: 0.75rem;
      font-weight: 700;
      letter-spacing: 0.1em;
      text-transform: uppercase;
      text-decoration: none;
      transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1);
      cursor: pointer;
    }
    
    .back-btn svg {
      width: 18px; 
      height: 18px; 
      transition: transform 0.2s;
    }

    .back-btn:hover {
      background: var(--accent);
      color: #fff;
      border-color: var(--accent);
      box-shadow: 0 0 20px var(--glow); 
      transform: translateY(-2px); 
    }

    .back-btn:hover svg {
      transform: translateX(-3px); /* Exaggerated nudge on hover */
    }

    .back-btn:active {
      transform: translateY(-1px) scale(0.95);
    }
    
    @media (max-width: 1200px) {
      .back-btn { top: 20px; left: 20px; }
    }
    @media (max-width: 600px) {
      /* Adjusted for mobile */
      .back-btn { height: 44px; padding: 0 18px 0 14px; top: 16px; left: 16px; }
    }
    
    /* ─── Responsive ─── */
    @media (max-width: 1200px) {
      #app { grid-template-columns: 260px 1fr 240px; padding: 20px; gap: 16px; }
    }
    @media (max-width: 900px) {
      #app {
        grid-template-columns: 1fr 1fr;
        grid-template-rows: auto 1fr;
        overflow-y: auto;
      }
      #clock-panel { grid-column: 1 / 3; grid-row: 1; height: auto; min-height: 120px; }
      #lists-panel { grid-column: 1; grid-row: 2; }
      #tuya-panel  { grid-column: 2; grid-row: 2; }
    }
  </style>
</head>
<body>

  <!-- Background -->
  <canvas id="bg-canvas"></canvas>
  <div class="glow-orb a"></div>
  <div class="glow-orb b"></div>
  <div class="glow-orb c"></div>
  <div class="grid-overlay"></div>
  <div class="rain" id="rain"></div>
  <div class="scanline"></div>
  <div id="flash"></div>

  <img id="photo-bg" src="cat.png" alt="">

  <!-- App -->
  <div id="app">
    <a href="#" class="back-btn" aria-label="Go Back">
      <svg viewBox="0 0 24 24" xmlns="http://www.w3.org/2000/svg">
        <path d="M15 18l-6-6 6-6" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round" fill="none"/>
      </svg>
    </a>

    <!-- ── LISTS (left) ── -->
    <div id="lists-panel" class="panel">
      <div class="panel-title">📋 Notes</div>

      <div class="list-block">
        <div class="list-label">To Do</div>
        <div class="list-box" id="lb-todo" data-key="wck_todo" contenteditable="true" spellcheck="false"></div>
      </div>

      <div class="list-block">
        <div class="list-label">Homework</div>
        <div class="list-box" id="lb-homework" data-key="wck_homework" contenteditable="true" spellcheck="false"></div>
      </div>

      <div class="list-block">
        <div class="list-label">Assessments</div>
        <div class="list-box" id="lb-assessments" data-key="wck_assessments" contenteditable="true" spellcheck="false"></div>
      </div>

      <div class="list-block">
        <div class="list-label">Goals</div>
        <div class="list-box" id="lb-goals" data-key="wck_goals" contenteditable="true" spellcheck="false"></div>
      </div>

      <div class="list-block">
        <div class="list-label">Projects</div>
        <div class="list-box" id="lb-projects" data-key="wck_projects" contenteditable="true" spellcheck="false"></div>
      </div>

      <div class="list-sync-note" style="display:none;"></div>
    </div>

    <!-- ── CLOCK (centre, spans full height) ── -->
    <div id="clock-panel">
      <div id="time-display">00:00:00</div>
      <div id="date-display">Thursday, 16 April</div>
    </div>

    <!-- ── LIGHTING & SMART DEVICES (right) ── -->
    <div id="tuya-panel" class="panel">
      <div class="panel-title">⚡ Lighting &amp; Smart Devices</div>
      <div id="server-status">
        <div class="status-dot" id="status-dot"></div>
        <span id="status-text">Connecting…</span>
      </div>
      <div id="tuya-wrapper">
        <div id="scroll-zone-top"></div>
        <div id="scroll-zone-bottom"></div>
        <div id="tuya-content">
          <div id="scripts-list">
            <div class="no-server">
              <strong>Server not detected</strong>
              Run <code style="color:var(--accent2)">server.py</code> to enable scene buttons.
            </div>
          </div>
        </div>
      </div>
    </div>

  </div>

  <script>

  /* BACK BUTTON LOGIC */
  (function() {
    const backBtn = document.querySelector('.back-btn');
    if (backBtn) {
      backBtn.addEventListener('click', (e) => {
        sessionStorage.setItem('walterck_toolkit_back', '1');
        // If the href is just "#", this will trigger the browser back
        if (backBtn.getAttribute('href') === '#') {
          e.preventDefault();
          window.history.back();
        }
      });
    }
  })();
    
  /* RAIN */
  (function () {
    const rain = document.getElementById('rain');
    for (let i = 0; i < 120; i++) {
      const d = document.createElement('div');
      d.className = 'drop';
      d.style.left = Math.random() * 100 + 'vw';
      const dur = (Math.random() * 2.5 + 1.8).toFixed(2);
      d.style.animationDuration = dur + 's';
      d.style.animationDelay = (-Math.random() * 5).toFixed(2) + 's';
      d.style.opacity = (Math.random() * 0.45 + 0.04).toFixed(2);
      d.style.height = (Math.random() * 22 + 14) + 'px';
      rain.appendChild(d);
    }
  })();

  /* ══════════════════════════════════════════
     FLOATING PARTICLES
  ══════════════════════════════════════════ */
  (function () {
    for (let i = 0; i < 20; i++) {
      const p = document.createElement('div');
      p.className = 'particle';
      const size = Math.random() * 2.5 + 0.5;
      const op   = (Math.random() * 0.12 + 0.02).toFixed(3);
      p.style.cssText = `
        left: ${Math.random() * 100}%;
        bottom: -10px;
        width: ${size}px; height: ${size}px;
        --op: ${op};
        animation-duration: ${(Math.random() * 18 + 10).toFixed(1)}s;
        animation-delay: ${(-Math.random() * 20).toFixed(1)}s;
      `;
      document.body.appendChild(p);
    }
  })();

  /* ══════════════════════════════════════════
     BACKGROUND CANVAS — aurora lines
  ══════════════════════════════════════════ */
  (function () {
    const cvs = document.getElementById('bg-canvas');
    const ctx = cvs.getContext('2d');
    let W, H, t = 0;

    function resize() {
      W = cvs.width  = window.innerWidth;
      H = cvs.height = window.innerHeight;
    }
    window.addEventListener('resize', resize);
    resize();

    const lines = Array.from({ length: 5 }, (_, i) => ({
      phase: (i / 5) * Math.PI * 2,
      amp:   60 + i * 20,
      speed: 0.0004 + i * 0.00015,
      y:     0.2 + i * 0.15,
      alpha: 0.015 + i * 0.005,
    }));

    function draw() {
      ctx.clearRect(0, 0, W, H);
      t += 0.6;
      lines.forEach(l => {
        ctx.beginPath();
        for (let x = 0; x <= W; x += 3) {
          const y = H * l.y + Math.sin(x * 0.004 + t * l.speed * 1000 + l.phase) * l.amp;
          x === 0 ? ctx.moveTo(x, y) : ctx.lineTo(x, y);
        }
        ctx.strokeStyle = `rgba(107,140,255,${l.alpha})`;
        ctx.lineWidth = 1;
        ctx.stroke();
      });
      requestAnimationFrame(draw);
    }
    draw();
  })();

  /* ══════════════════════════════════════════
     CLOCK
  ══════════════════════════════════════════ */
  const DAYS   = ['Sunday','Monday','Tuesday','Wednesday','Thursday','Friday','Saturday'];
  const MONTHS = ['January','February','March','April','May','June',
                  'July','August','September','October','November','December'];

  function pad(n) { return String(n).padStart(2, '0'); }

  function updateClock() {
    const now = new Date();
    document.getElementById('time-display').textContent =
      `${pad(now.getHours())}:${pad(now.getMinutes())}:${pad(now.getSeconds())}`;
    document.getElementById('date-display').textContent =
      `${DAYS[now.getDay()]}, ${now.getDate()} ${MONTHS[now.getMonth()]}`;
  }

  setInterval(updateClock, 1000);
  updateClock();

  /* ══════════════════════════════════════════
     OCCASIONAL LIGHTNING FLASH
  ══════════════════════════════════════════ */
  (function lightningLoop() {
    const flash = document.getElementById('flash');
    const delay = 8000 + Math.random() * 20000;
    setTimeout(() => {
      flash.style.opacity = '1';
      setTimeout(() => {
        flash.style.opacity = '0';
        setTimeout(() => {
          flash.style.opacity = '1';
          setTimeout(() => { flash.style.opacity = '0'; lightningLoop(); }, 80);
        }, 120);
      }, 60);
    }, delay);
  })();

  /* ══════════════════════════════════════════
     LISTS — iCloud file sync via tuya server
  ══════════════════════════════════════════ */
  (function () {
    const NOTES_URL = 'http://localhost:8765/notes';

    // Build label→box map from DOM
    const boxes = [];
    document.querySelectorAll('.list-block').forEach(block => {
      const label = block.querySelector('.list-label')?.textContent?.trim();
      const box   = block.querySelector('.list-box');
      if (label && box) boxes.push({ label, box });
    });

    // Load all notes from server; skip boxes that are focused (user is typing)
    async function loadNotes() {
      try {
        const r    = await fetch(NOTES_URL);
        const data = await r.json();
        boxes.forEach(({ label, box }) => {
          if (document.activeElement === box) return; // don't clobber while typing
          const incoming = data[label] ?? '';
          if (incoming !== box.innerText) box.innerText = incoming;
        });
      } catch {}
    }

    // Save a single note to server → writes Label.txt in Notes Sync folder
    async function saveNote(label, content) {
      try {
        await fetch(`${NOTES_URL}/${encodeURIComponent(label)}`, {
          method: 'POST',
          body: content
        });
      } catch {}
    }

    // Write on every keystroke
    boxes.forEach(({ label, box }) => {
      box.addEventListener('input', () => saveNote(label, box.innerText));
    });

    // Debounced sync triggered by any user activity
    let syncTimer = null;
    function scheduleSync() {
      clearTimeout(syncTimer);
      syncTimer = setTimeout(loadNotes, 600);
    }
    ['mousemove', 'click', 'keydown', 'touchstart'].forEach(e =>
      document.addEventListener(e, scheduleSync, { passive: true })
    );

    // Initial load + idle poll every 10 s
    loadNotes();
    setInterval(loadNotes, 10000);
  })();

  /* ══════════════════════════════════════════
     SMART DEVICES / TUYA SERVER
  ══════════════════════════════════════════ */
  const SERVER = 'http://localhost:8765';
  const dot    = document.getElementById('status-dot');
  const stxt   = document.getElementById('status-text');
  const sList  = document.getElementById('scripts-list');

  // Custom device order — matched against script filenames (case-insensitive, partial)
  const DEVICE_ORDER = [
    'filters on', 'filters off', 'brightness',
    'lights on', 'lights off', 'lights min', 'lights max',
    'inferno', 'ember', 'viridian', 'cerulean', 'nebula',
    'phone on', 'phone off',
    'powerhouse on', 'powerhouse off',
    'laptop on', 'laptop off',
    'toothbrush on', 'toothbrush off',
    'powerboard bootup', 'powerboard shutdown'
  ];

  function sortScripts(scripts) {
    return [...scripts].sort((a, b) => {
      const labelA = a.replace(/\.(bat|lnk|vbs)$/i, '').replace(/[-_]/g, ' ').toLowerCase();
      const labelB = b.replace(/\.(bat|lnk|vbs)$/i, '').replace(/[-_]/g, ' ').toLowerCase();
      const iA = DEVICE_ORDER.findIndex(o => labelA.includes(o));
      const iB = DEVICE_ORDER.findIndex(o => labelB.includes(o));
      if (iA === -1 && iB === -1) return labelA.localeCompare(labelB);
      if (iA === -1) return 1;
      if (iB === -1) return -1;
      return iA - iB;
    });
  }

  // 💡 for anything light/ambience-related; 🛡️ for everything else
  function scriptIcon(name) {
    const n = name.toLowerCase().replace(/[-_.]/g, ' ').replace(/\.(bat|lnk|vbs)$/i, '');
    const lightWords = [
      'light', 'lights', 'lamp', 'bulb',
      'ember', 'inferno', 'nebula', 'viridian', 'cerulean',
      'glow', 'bright', 'brightness', 'dim', 'warm', 'cool', 'white',
      'colour', 'color', 'filter', 'filters', 'hue', 'kelvin', 'lumen'
    ];
    if (lightWords.some(w => n.includes(w))) return '💡';
    return '🛡️';
  }

  function buildScriptButtons(scripts) {
    sList.innerHTML = '';
    if (!scripts.length) {
      sList.innerHTML = '<div class="no-server">No scripts found in<br><code style="color:var(--accent2)">C:\\Scripts\\Tuya Scenes\\Bones</code></div>';
      return;
    }
    sortScripts(scripts).forEach(name => {
      const btn = document.createElement('button');
      btn.className = 'script-btn';
      const label = name.replace(/\.(bat|lnk|vbs)$/i, '').replace(/[-_]/g, ' ');
      btn.innerHTML = `
        <div class="btn-icon">${scriptIcon(name)}</div>
        <span class="btn-name">${label}</span>
        <span class="btn-arrow">▶</span>
      `;
      btn.addEventListener('click', () => runScript(name, btn));
      sList.appendChild(btn);
    });
  }

  function runScript(name, btn) {
    btn.classList.add('fired');
    fetch(`${SERVER}/run?script=${encodeURIComponent(name)}`)
      .then(r => r.json())
      .then(data => {
        if (data.ok) {
          triggerFlash();
          setTimeout(() => btn.classList.remove('fired'), 1800);
        } else {
          btn.classList.remove('fired');
        }
      })
      .catch(() => btn.classList.remove('fired'));
  }

  function triggerFlash() {
    const f = document.getElementById('flash');
    f.style.opacity = '1';
    setTimeout(() => f.style.opacity = '0', 80);
  }

  async function checkServer() {
   try {
     // Increased timeout to 4 seconds for better stability
     const r = await fetch(`${SERVER}/ping`, { signal: AbortSignal.timeout(4000) });
     const d = await r.json();
     if (d.alive) {
       dot.classList.add('online');
       stxt.textContent = 'Bridge online';
       // Only reload the list if it's currently empty
       if (sList.children.length < 2) loadScripts(); 
     }
   } catch {
     dot.classList.remove('online');
     stxt.textContent = 'Connecting...'; // Less aggressive than "OFFLINE"
   }
 }

  async function loadScripts() {
    try {
      const r = await fetch(`${SERVER}/list`);
      const d = await r.json();
      buildScriptButtons(d.scripts || []);
    } catch {}
  }

  checkServer();
  setInterval(checkServer, 10000);

  /* ══════════════════════════════════════════
     HOVER-TO-SCROLL
  ══════════════════════════════════════════ */
  (function () {
    const content = document.getElementById('tuya-content');
    const zTop    = document.getElementById('scroll-zone-top');
    const zBot    = document.getElementById('scroll-zone-bottom');
    const SPEED   = 12;
    let rafId     = null;
    let dir       = 0;

    function updateZones() {
      zTop.classList.toggle('hidden', content.scrollTop <= 0);
      zBot.classList.toggle('hidden', content.scrollTop + content.clientHeight >= content.scrollHeight - 1);
    }

    function tick() {
      content.scrollTop += dir * SPEED;
      updateZones();
      rafId = requestAnimationFrame(tick);
    }

    function start(d) { dir = d; if (!rafId) rafId = requestAnimationFrame(tick); }
    function stop()   { if (rafId) { cancelAnimationFrame(rafId); rafId = null; } }

    zTop.addEventListener('mouseenter', () => start(-1));
    zTop.addEventListener('mouseleave', stop);
    zBot.addEventListener('mouseenter', () => start(1));
    zBot.addEventListener('mouseleave', stop);
    content.addEventListener('scroll', updateZones);

    const obs = new MutationObserver(updateZones);
    obs.observe(content, { childList: true, subtree: true });
    updateZones();
  })();

  </script>
</body>
